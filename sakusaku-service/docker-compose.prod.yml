# Production compose — nginx + php-fpm + worker + scheduler
# Usage: docker compose -f docker-compose.prod.yml up -d
# Before: npm run build, php artisan config:cache, php artisan route:cache

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["php-fpm"]
    expose:
      - "9000"
    volumes:
      - .:/var/www/html
      - ./storage:/var/www/html/storage
    env_file: .env
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - sakusaku-net
      - dify-net
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "8083:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - sakusaku-net
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: php artisan queue:work redis --queue=default,images,notifications --sleep=3 --tries=3 --max-time=3600
    volumes:
      - .:/var/www/html
    env_file: .env
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - sakusaku-net
      - dify-net
    restart: unless-stopped

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    command: sh -c "while true; do php artisan schedule:run --no-interaction; sleep 60; done"
    volumes:
      - .:/var/www/html
    env_file: .env
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - sakusaku-net
      - dify-net
    restart: unless-stopped

networks:
  sakusaku-net:
    driver: bridge
  dify-net:
    external: true
    name: docker_default
